version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - revive
    - goconst
    - gocritic
    - unconvert
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF1012"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0